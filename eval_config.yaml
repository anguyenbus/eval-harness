# Evaluation harness configuration
# This file controls dataset paths, metric thresholds, and model settings

datasets:
  # OmniDocBench English-only (593 docs)
  omnidocbench:
    path: ${DATA_DIR:-.}/data/parsing/omnidocbench_english

  # DP-Bench for document parsing evaluation
  dp_bench:
    path: ${DATA_DIR:-.}/data/parsing/dp_bench

  # Legal RAG Bench for RAG evaluation with RAGAS LLM-judge metrics
  legal_rag_bench:
    path: ${DATA_DIR:-.}/data/rag/legal_rag_bench/corpus_files
    hf_token_path: ${HF_TOKEN_PATH:-~/.huggingface/token}
    cache_path: ${DATA_DIR:-.}/data/rag/legal_rag_bench
    k_values: [5, 10, 20]
    # Shared embedder configuration (used by RAG retrieval + RAGAS)
    embeddings:
      provider: huggingface  # huggingface (local), openai (api), bedrock (future)
      model: sentence-transformers/all-MiniLM-L6-v2
    ragas:
      judge_model: gpt-4o
      judge_model_provider: openai
      temperature: 0

metrics:
  # Text fidelity (character-level F1) threshold
  text_fidelity:
    threshold: 0.95

  # Structure recall (element detection coverage) threshold
  structure_recall:
    threshold: 0.90

  # Table TEDS similarity threshold
  table_teds:
    threshold: 0.85

  # Reading order (Kendall tau) threshold
  reading_order:
    threshold: 0.80

  # NID (normalized indel distance) threshold for DP-Bench
  nid:
    threshold: 0.90

models:
  # LLM-as-judge model (pinned version for reproducibility)
  judge_model: anthropic_model_name
  temperature: 0

  # Embedding model for RAG evaluation
  embedding_model: embedding_model_name

phoenix:
  # Phoenix endpoint for trace visualization (deferred for MVP)
  endpoint: ${PHOENIX_ENDPOINT:-http://localhost:6006}
  project_name: eval-harness
